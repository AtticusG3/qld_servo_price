name: Test Coverage

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          python -m pytest -q tests/components/qld_servo_price \
            --cov=custom_components/qld_servo_price \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=95 \
            --cov-report=xml:coverage.xml | tee coverage-summary.txt

      - name: Run strict type checks
        run: |
          python -m mypy --config-file mypy.ini custom_components/qld_servo_price/diagnostics.py

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-evidence
          path: |
            coverage.xml
            coverage-summary.txt
